<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gibbkayyy</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1f14;
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* 🌟 floating background boxes */
.bg-box {
    position: absolute;
    width: 60px;
    height: 60px;
    border: 2px solid #00ff88;
    opacity: 0.08;
    animation: float 14s infinite linear;
}

@keyframes float {
    from { transform: translateY(110vh) rotate(0deg); }
    to { transform: translateY(-10vh) rotate(360deg); }
}

/* ✨ glowing title */
.title {
    font-size: 3rem;
    margin-top: 80px;
    color: #00ff88;
    text-shadow:
        0 0 10px #00ff88,
        0 0 20px #00ff88,
        0 0 40px #00ff88;
    animation: glowPulse 2s infinite alternate;
}

@keyframes glowPulse {
    from { text-shadow: 0 0 10px #00ff88; }
    to { text-shadow: 0 0 45px #00ff88; }
}

/* 🔗 buttons */
.links {
    margin-top: 30px;
}

.btn {
    display: inline-block;
    padding: 14px 24px;
    margin: 10px;
    border: 2px solid #00ff88;
    color: #00ff88;
    text-decoration: none;
    font-weight: bold;
    border-radius: 10px;
    position: relative;
    overflow: hidden;
    transition: 0.3s;
}

.btn:hover {
    background: #00ff88;
    color: black;
    box-shadow: 0 0 25px #00ff88;
}

/* ➕ moving plus animation */
.btn::after {
    content: "+";
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.6;
    animation: plusMove 1.2s infinite alternate;
}

@keyframes plusMove {
    from { right: 10px; opacity: 0.3; }
    to { right: 16px; opacity: 1; }
}

/* 📊 stats */
.stats {
    margin-top: 120px;
    font-size: 1.5rem;
}

.stat {
    margin: 16px;
    font-weight: bold;
    animation: floatText 3s ease-in-out infinite;
}

@keyframes floatText {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
}
</style>
</head>

<body>

<!-- background boxes -->
<script>
for (let i = 0; i < 25; i++) {
    let box = document.createElement("div");
    box.className = "bg-box";
    box.style.left = Math.random() * 100 + "vw";
    box.style.animationDuration = (10 + Math.random() * 10) + "s";
    document.body.appendChild(box);
}
</script>

<h1 class="title">gibbkayyy</h1>

<div class="links">
    <a class="btn" href="https://youtube.com">YouTube</a>
    <a class="btn" href="https://tiktok.com">TikTok</a>
</div>

<div class="stats" id="statsSection">
    <div class="stat">Subscribers: <span id="subs">0</span>+</div>
    <div class="stat">Total Views: <span id="views">0</span>+</div>
    <div class="stat">Edits: <span id="edits">0</span>+</div>
    <div class="stat">TikTok Followers: <span id="ttfollowers">0</span>+</div>
    <div class="stat">TikTok Likes: <span id="ttlikes">0</span>+</div>
</div>

<script>
// 🔢 count up
function countUp(id, target, speed) {
    let el = document.getElementById(id);
    let count = 0;
    let inc = target / speed;

    let interval = setInterval(() => {
        count += inc;
        if (count >= target) {
            count = target;
            clearInterval(interval);
        }
        el.innerText = Math.floor(count).toLocaleString();
    }, 20);
}

// 👀 scroll trigger (only once)
let triggered = false;

const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting && !triggered) {
            triggered = true;

            countUp("subs", 400, 100);
            countUp("views", 140000, 150);
            countUp("edits", 50, 80);
            countUp("ttfollowers", 1000, 120);
            countUp("ttlikes", 10300, 140);
        }
    });
}, { threshold: 0.4 });

observer.observe(document.getElementById("statsSection"));
</script>

</body>
</html>
