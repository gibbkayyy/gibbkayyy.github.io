<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gibbkayyy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: white;
      background: black;
      overflow: hidden;
    }
    
    /* Dark overlay */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(0,0,0,0.3), rgba(0,0,0,0.9));
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 6rem;
      letter-spacing: 8px;
      margin: 0;
      color: #00ff88;
      text-shadow: 0 0 30px #00ff88;
      animation: fadeUp 1s ease forwards;
    }

    .tagline {
      margin-top: 10px;
      opacity: 0;
      font-size: 1.1rem;
      letter-spacing: 1px;
      animation: fadeUp 1.8s ease forwards;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .links {
      margin-top: 50px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 2.5s ease forwards;
    }

    .links a {
      padding: 14px 32px;
      border: 1px solid #00ff88;
      color: #00ff88;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
      backdrop-filter: blur(5px);
    }

    .links a:hover {
      background: #00ff88;
      color: black;
      box-shadow: 0 0 25px #00ff88;
      transform: translateY(-3px);
    }

    /* subtle glow pulse */
    h1 {
      animation: fadeUp 1s ease forwards, glowPulse 3s infinite alternate;
    }

    @keyframes glowPulse {
      from {
        text-shadow: 0 0 15px #00ff88;
      }
      to {
        text-shadow: 0 0 35px #00ff88;
      }
    }

  </style>
</head>

<body>

  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="container">
    <h1>GIBBKAYYY</h1>
    <div class="tagline">edits that hit different</div>

    <div class="links">
      <a href="https://www.youtube.com/@gibbkayyy" target="_blank">YouTube</a>
      <a href="https://www.tiktok.com/@gibbkayyy" target="_blank">TikTok</a>
      <a href="https://discord.gg/uTmn7mRx" target="_blank">Discord</a>
    </div>
  </div>

</body>
</html>
