<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gibbkayyy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Inter, sans-serif;
  background:black;
  color:white;
  overflow-x:hidden;
}

/* LOCK */
body.loading {
  overflow:hidden;
  height:100vh;
  pointer-events:none;
}

/* LOADER */
.loader {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:99999;
}

.spinner {
  width:60px;
  height:60px;
  border:4px solid rgba(0,255,136,0.2);
  border-top:4px solid #00ff88;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  to { transform:rotate(360deg); }
}

.loadtext {
  margin-top:20px;
  color:#00ff88;
}

.loadnote {
  margin-top:10px;
  font-size:0.85rem;
  opacity:0.6;
}

/* BACKGROUND */
.bg-video {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-3;
}

.bg-video video {
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.35);
}

.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle, rgba(0,0,0,0.2), rgba(0,0,0,0.95));
  z-index:-2;
}

.grid {
  position:fixed;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(0,255,136,0.18) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,136,0.18) 1px, transparent 1px);
  background-size:70px 70px;
  z-index:-1;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.glitch {
  font-family:"Bebas Neue";
  font-size:6rem;
  color:#00ff88;
  letter-spacing:6px;
  text-shadow:
    0 0 10px #00ff88,
    0 0 20px #00ff88,
    0 0 40px #00ff88;
}

/* LINKS */
.links {
  margin-top:30px;
  display:flex;
  gap:12px;
}

.links a {
  padding:12px 20px;
  border:1px solid #00ff88;
  color:#00ff88;
  text-decoration:none;
  transition:0.3s;
}

.links a:hover {
  background:#00ff88;
  color:black;
}

/* STATS */
.stats {
  display:flex;
  justify-content:center;
  gap:25px;
  flex-wrap:wrap;
  padding:60px 20px;
}

.stat {
  text-align:center;
  border:1px solid rgba(0,255,136,0.2);
  padding:20px;
  border-radius:10px;
  transition:0.3s;
}

.stat:hover {
  box-shadow:0 0 15px rgba(0,255,136,0.3);
}

.stat h3 {
  color:#00ff88;
  font-size:2rem;
  animation:pulseGlow 2s infinite;
}

@keyframes pulseGlow {
  0% { text-shadow:0 0 5px #00ff88; }
  50% { text-shadow:0 0 20px #00ff88; }
  100% { text-shadow:0 0 5px #00ff88; }
}

.stat p {
  opacity:0.7;
}

/* EDITS */
.gridCards {
  display:grid;
  grid-template-columns:1fr;
  gap:18px;
  max-width:900px;
  margin:auto;
  padding:40px;
}

.card iframe {
  width:100%;
  height:230px;
}

/* FOOTER */
.footer {
  text-align:center;
  padding:30px;
  opacity:0.6;
}
</style>
</head>

<body class="loading">

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="spinner"></div>
  <div class="loadtext">Loading</div>
  <div class="loadnote">It may take a while for everything to load</div>
</div>

<!-- BG -->
<div class="bg-video">
  <video autoplay muted loop>
    <source src="avengers.mp4" type="video/mp4">
  </video>
</div>

<div class="overlay"></div>
<div class="grid"></div>

<!-- HERO -->
<div class="hero">
  <div class="glitch">GIBBKAYYY</div>

  <div class="links">
    <a href="https://www.youtube.com/@gibbkayyy" target="_blank">YouTube</a>
    <a href="https://www.tiktok.com/@gibbkayyy" target="_blank">TikTok</a>
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat">
    <h3 data-target="400">0</h3>
    <p>YouTube Subs+</p>
  </div>
  <div class="stat">
    <h3 data-target="140000">0</h3>
    <p>Total Views+</p>
  </div>
  <div class="stat">
    <h3 data-target="50">0</h3>
    <p>Edits+</p>
  </div>
  <div class="stat">
    <h3 data-target="1000">0</h3>
    <p>TikTok Followers+</p>
  </div>
  <div class="stat">
    <h3 data-target="10300">0</h3>
    <p>TikTok Likes+</p>
  </div>
</div>

<!-- EDITS -->
<div class="gridCards">
  <div class="card"><iframe src="https://www.youtube.com/embed/ecS-z1i5TcU"></iframe></div>
  <div class="card"><iframe src="https://www.youtube.com/embed/9aejUaq9Mhc"></iframe></div>
  <div class="card"><iframe src="https://www.youtube.com/embed/HQ293NZgObM"></iframe></div>
  <div class="card"><iframe src="https://www.youtube.com/embed/VhAWA0iRMEM"></iframe></div>
</div>

<footer class="footer">
  © 2026 Gibbkayyy. All rights reserved.
</footer>

<script>
window.addEventListener("load", () => {
  const loader = document.getElementById("loader");

  loader.style.opacity = "0";

  setTimeout(() => {
    loader.style.display = "none";
    document.body.classList.remove("loading");
    startCounter();
  }, 600);
});

function startCounter() {
  const counters = document.querySelectorAll("[data-target]");

  counters.forEach(counter => {
    const update = () => {
      const target = +counter.getAttribute("data-target");
      const current = +counter.innerText;
      const increment = target / 100;

      if (current < target) {
        counter.innerText = Math.ceil(current + increment);
        setTimeout(update, 20);
      } else {
        counter.innerText = target + "+";
      }
    };

    update();
  });
}
</script>

</body>
</html>
