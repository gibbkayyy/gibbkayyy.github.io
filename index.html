<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gibbkayyy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior:smooth; }

body {
  font-family: Inter, sans-serif;
  background:black;
  color:white;
  overflow-x:hidden;
}

/* 🔥 BACKGROUND VIDEO (MP4) */
.bg-video {
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  overflow:hidden;
  z-index:-3;
}

.bg-video video {
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.15);
  filter:brightness(0.35) contrast(1.2);
}

/* 🌌 OVERLAY */
.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.95));
  z-index:-2;
}

/* 🌐 NEON GRID BOXES */
.grid {
  position:fixed;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(0,255,136,0.22) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,136,0.22) 1px, transparent 1px);
  background-size:70px 70px;
  opacity:0.85;
  z-index:-1;
  animation: moveGrid 18s linear infinite;
  mix-blend-mode: screen;
}

@keyframes moveGrid {
  from { transform:translateY(0); }
  to { transform:translateY(-70px); }
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.glitch {
  font-family:"Bebas Neue";
  font-size:6rem;
  color:#00ff88;
  letter-spacing:6px;
  text-shadow:0 0 30px #00ff88;
}

.tagline {
  opacity:0.85;
  margin-top:10px;
  letter-spacing:2px;
}

/* LINKS */
.links {
  margin-top:35px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
}

.links a {
  padding:12px 20px;
  border:1px solid #00ff88;
  color:#00ff88;
  text-decoration:none;
  transition:0.3s;
  font-weight:500;
}

.links a:hover {
  background:#00ff88;
  color:black;
}

/* ABOUT */
.about {
  display:flex;
  justify-content:center;
  padding:60px 20px;
}

.about-box {
  max-width:700px;
  text-align:center;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(0,255,136,0.15);
  padding:30px;
  border-radius:12px;
  backdrop-filter:blur(10px);
}

.about-box h3 {
  color:#00ff88;
  font-family:"Bebas Neue";
  font-size:2rem;
  margin-bottom:10px;
}

.about-box p {
  opacity:0.8;
  line-height:1.6;
}

/* EDITS */
section {
  padding:100px 20px;
}

h2 {
  text-align:center;
  font-family:"Bebas Neue";
  font-size:3rem;
  color:#00ff88;
}

.subtext {
  text-align:center;
  opacity:0.7;
  margin-bottom:30px;
}

/* GRID */
.gridCards {
  display:grid;
  grid-template-columns:1fr;
  gap:18px;
  max-width:900px;
  margin:auto;
}

.card {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(0,255,136,0.2);
  overflow:hidden;
  border-radius:10px;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.03);
  box-shadow:0 0 25px rgba(0,255,136,0.2);
}

iframe {
  width:100%;
  height:230px;
  border:none;
}

/* DESKTOP */
@media (min-width:768px) {
  .gridCards {
    grid-template-columns:repeat(2,1fr);
  }
}
</style>
</head>

<body>

<!-- 🔥 BACKGROUND VIDEO -->
<div class="bg-video">
  <video autoplay muted loop playsinline>
    <source src="avengers.mp4" type="video/mp4">
  </video>
</div>

<div class="overlay"></div>
<div class="grid"></div>

<!-- HERO -->
<div class="hero">
  <div class="glitch">GIBBKAYYY</div>
  <div class="tagline">Made To Be Watched</div>

  <div class="links">
    <a href="https://www.youtube.com/@gibbkayyy" target="_blank">YouTube</a>
    <a href="https://www.tiktok.com/@gibbkayyy" target="_blank">TikTok</a>
    <a href="https://discord.gg/uTmn7mRx" target="_blank">Discord</a>
  </div>
</div>

<!-- ABOUT -->
<div class="about">
  <div class="about-box">
    <h3>About</h3>
    <p>
      Cinematic edit hub showcasing high-impact visuals.
      Join Discord for exclusive updates, early previews, and behind-the-scenes content.
    </p>
  </div>
</div>

<!-- EDITS -->
<section>
  <h2>Featured Edits</h2>
  <div class="subtext">Click to watch your edits</div>

  <div class="gridCards">

    <div class="card"><iframe src="https://www.youtube.com/embed/ecS-z1i5TcU"></iframe></div>
    <div class="card"><iframe src="https://www.youtube.com/embed/9aejUaq9Mhc"></iframe></div>
    <div class="card"><iframe src="https://www.youtube.com/embed/HQ293NZgObM"></iframe></div>
    <div class="card"><iframe src="https://www.youtube.com/embed/VhAWA0iRMEM"></iframe></div>

  </div>
</section>

</body>
</html>
