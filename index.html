<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gibbkayyy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior:smooth; }

body {
  font-family: Inter, sans-serif;
  background:black;
  color:white;
  overflow-x:hidden;
}

/* LOADING SCREEN */
.loader {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
  animation: fadeOut 1s ease forwards;
  animation-delay: 2.2s;
}

.loader h1 {
  font-family:"Bebas Neue";
  font-size:3rem;
  color:#00ff88;
  letter-spacing:5px;
  animation: pulse 1s infinite alternate;
}

@keyframes pulse {
  from { text-shadow:0 0 10px #00ff88; }
  to { text-shadow:0 0 30px #00ff88; }
}

@keyframes fadeOut {
  to { opacity:0; visibility:hidden; }
}

/* BACKGROUND VIDEO */
.video-bg {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.22) contrast(1.2);
  z-index:-3;
}

/* OVERLAYS */
.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.95));
  z-index:-2;
}

.grid {
  position:fixed;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size:60px 60px;
  z-index:-1;
  animation: moveGrid 30s linear infinite;
}

@keyframes moveGrid {
  from { transform:translateY(0); }
  to { transform:translateY(-60px); }
}

.glow {
  position:fixed;
  width:700px;
  height:700px;
  background:#00ff88;
  filter:blur(180px);
  opacity:0.12;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:-1;
}

/* COUNTER */
.counter {
  position:fixed;
  top:15px;
  left:15px;
  padding:10px 14px;
  border:1px solid rgba(0,255,136,0.4);
  background:rgba(0,0,0,0.4);
  color:#00ff88;
  font-size:0.9rem;
  backdrop-filter:blur(10px);
  z-index:999;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.glitch {
  font-family:"Bebas Neue";
  font-size:6rem;
  color:#00ff88;
  letter-spacing:6px;
  text-shadow:0 0 25px #00ff88;
}

.tagline {
  opacity:0.7;
  margin-top:10px;
}

/* LINKS */
.links {
  margin-top:40px;
  display:flex;
  gap:15px;
}

.links a {
  padding:12px 26px;
  border:1px solid #00ff88;
  color:#00ff88;
  text-decoration:none;
  transition:0.3s;
}

.links a:hover {
  background:#00ff88;
  color:black;
}

/* STATS */
.stats {
  display:flex;
  justify-content:center;
  gap:60px;
  padding:60px 20px;
  background:rgba(255,255,255,0.02);
}

/* SECTIONS */
section {
  padding:120px 20px;
}

h2 {
  text-align:center;
  margin-bottom:40px;
  font-family:"Bebas Neue";
  font-size:3rem;
  color:#00ff88;
}

/* EDIT GRID */
.gridCards {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px,1fr));
  gap:20px;
  max-width:1100px;
  margin:auto;
}

.card {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(0,255,136,0.2);
  padding:10px;
  transition:0.3s;
  transform:translateY(30px);
  opacity:0;
}

.card.show {
  transform:translateY(0);
  opacity:1;
}

.card:hover {
  transform:scale(1.03);
  box-shadow:0 0 25px rgba(0,255,136,0.2);
}

/* HOVER PLAY VIDEO */
.card video {
  width:100%;
  border-radius:10px;
  transition:0.3s;
}

/* subtle zoom on hover */
.card:hover video {
  transform:scale(1.05);
}
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div class="loader">
  <h1>GIBBKAYYY</h1>
</div>

<!-- BACKGROUND -->
<video class="video-bg" autoplay muted loop>
  <source src="https://www.w3schools.com/html/mov_bbb.mp4">
</video>

<div class="overlay"></div>
<div class="grid"></div>
<div class="glow"></div>

<!-- COUNTER -->
<div class="counter">
  Visits: <span id="visits">0</span>
</div>

<!-- HERO -->
<div class="hero">
  <div class="glitch">GIBBKAYYY</div>
  <div class="tagline">visuals that hit different</div>

  <div class="links">
    <a href="https://youtube.com" target="_blank">YouTube</a>
    <a href="https://tiktok.com" target="_blank">TikTok</a>
    <a href="https://discord.gg" target="_blank">Discord</a>
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div><h3>Edits</h3><p>High impact</p></div>
  <div><h3>Style</h3><p>Cinematic sync</p></div>
  <div><h3>Focus</h3><p>Visual storytelling</p></div>
</div>

<!-- FEATURED EDITS -->
<section>
  <h2>Featured Edits</h2>

  <div class="gridCards">

    <div class="card">
      <video muted loop preload="metadata" src="https://www.w3schools.com/html/movie.mp4"></video>
    </div>

    <div class="card">
      <video muted loop preload="metadata" src="https://www.w3schools.com/html/movie.mp4"></video>
    </div>

    <div class="card">
      <video muted loop preload="metadata" src="https://www.w3schools.com/html/movie.mp4"></video>
    </div>

  </div>
</section>

<script>
/* COUNTER */
fetch("https://api.countapi.xyz/hit/gibbkayyy-site/visits")
.then(res => res.json())
.then(data => {
  document.getElementById("visits").innerText = data.value;
});

/* SCROLL REVEAL */
const cards = document.querySelectorAll(".card");
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if(e.isIntersecting) e.target.classList.add("show");
  });
});
cards.forEach(c => observer.observe(c));

/* HOVER TO PLAY */
document.querySelectorAll(".card").forEach(card => {
  const video = card.querySelector("video");

  card.addEventListener("mouseenter", () => {
    video.play();
  });

  card.addEventListener("mouseleave", () => {
    video.pause();
    video.currentTime = 0;
  });
});
</script>

</body>
</html>
